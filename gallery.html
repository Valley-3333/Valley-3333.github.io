<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valley | Online Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-font-awesome-kit.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" href="images/valley_icon.png" type="image/x-icon">
    <meta property="og:title" content="Valleyのぺーじ">
    <meta property="og:description" content="HoI4 ModderのValleyです。こんにちは。こんばんわ。">
    <meta property="og:image" content="images/valley_icon.png">
    <meta name="twitter:card" content="summary_large_image">
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="header-inner">
                <nav class="site-nav">
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="other.html">Other</a></li>
                        <li><a href="links.html">Links</a></li>
                        <li><a href="gallery.html">Gallery</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <main>
            <h2>Gallery</h2>
            
            <div class="gallery-grid" id="galleryGrid">
                <!-- ギャラリーアイテムはここに動的に生成されます -->
            </div>
        </main>

        <footer>
            <p>&copy; BC240 ... 1910, 1986, 2061 Valley. Verified Profile.</p>
        </footer>
    </div>

    <script>
        // ギャラリーデータ
        const galleryData = [
            { id: 1, image: 'images/zou.jpg', title: 'ぞうさん', description: 'これはぞうさんの画像です。かわいいですね。電波を受信して、水を鼻から出しているのでしょうか？ともかく見た目からしてぞうさんなのは間違いないですね。'},
            { id: 2, image: 'images/koneko.png', title: 'こねこ', description: '足から浮力を出しています。プロペラがついていますね。これはねこです。' },
            { id: 3, image: 'images/puding-UFO.jpg', title: 'プリンとUFOの類似性', description: 'プリンとUFOって似ていますよね。特に…あ～、あそこらへん。まあ見ればわかるでしょう。' },
            { id: 4, image: 'images/sakana.jpg', title: 'さかな', description: '海の魚を写実的に描きました。海にはよくいた覚えがあり、とても楽しかった思い出です。特にガシャポン。' },
            { id: 5, image: 'images/tateana.jpg', title: 'たてあなしきじゅうきょ', description: '地面に埋まっているのは竪穴式住居' },
            { id: 6, image: 'images/kame.png', title: 'かめ', description: 'かめだ。かわいいね。' },
            { id: 7, image: 'images/valley_icon.png', title: '作品 7', description: '説明を入力してください。' },
            { id: 8, image: 'images/valley_icon.png', title: '作品 8', description: '説明を入力してください。' },
            { id: 9, image: 'images/valley_icon.png', title: '作品 9', description: '説明を入力してください。' },
            { id: 10, image: 'images/valley_icon.png', title: '作品 10', description: '説明を入力してください。' },
            { id: 11, image: 'images/valley_icon.png', title: '作品 11', description: '説明を入力してください。' },
            { id: 12, image: 'images/valley_icon.png', title: '作品 12', description: '説明を入力してください。' },
            { id: 13, image: 'images/valley_icon.png', title: '作品 13', description: '説明を入力してください。' },
            { id: 14, image: 'images/valley_icon.png', title: '作品 14', description: '説明を入力してください。' },
            { id: 15, image: 'images/valley_icon.png', title: '作品 15', description: '説明を入力してください。' },
            { id: 16, image: 'images/valley_icon.png', title: '作品 16', description: '説明を入力してください。' },
            { id: 17, image: 'images/valley_icon.png', title: '作品 17', description: '説明を入力してください。' },
            { id: 18, image: 'images/valley_icon.png', title: '作品 18', description: '説明を入力してください。' },
            { id: 19, image: 'images/valley_icon.png', title: '作品 19', description: '説明を入力してください。' }
        ];

        // ギャラリーを初期化
        function initGallery() {
            const gallery = document.getElementById('galleryGrid');
            gallery.innerHTML = '';
            
            galleryData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'gallery-card';
                card.innerHTML = `
                    <div class="gallery-image-container">
                        <img src="${item.image}" alt="${item.title}" class="gallery-image">
                        <button class="toggle-info-btn" onclick="toggleInfo(${item.id})" title="説明を表示/非表示">
                            <i class="fas fa-chevron-down"></i>
                        </button>
                    </div>
                    <div class="gallery-info" id="info-${item.id}" style="display: none;">
                        <h3>${item.title}</h3>
                        <p>${item.description}</p>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        // 説明のトグル機能
        function toggleInfo(id) {
            const infoElement = document.getElementById(`info-${id}`);
            if (infoElement) {
                const isHidden = infoElement.style.display === 'none';
                infoElement.style.display = isHidden ? 'block' : 'none';
                
                // ボタンの状態を視覚的に変更
                const button = event.target.closest('.toggle-info-btn');
                if (button) {
                    button.classList.toggle('active');
                }
            }
        }

        // ページ読み込み時に初期化
        document.addEventListener('DOMContentLoaded', initGallery);
    </script>
</body>
</html>
